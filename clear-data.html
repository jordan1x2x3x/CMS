<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clear CMS Data</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F4F6FA; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .card { background: white; border-radius: 16px; padding: 2.5rem 2rem; max-width: 560px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; color: #1A1A2E; }
    p  { font-size: 0.83rem; color: #6B7280; margin-bottom: 1.5rem; line-height: 1.6; }
    .btn { width: 100%; padding: 12px; background: #EF4444; color: white; border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-bottom: 0.75rem; }
    .btn:hover { background: #DC2626; }
    .btn-back { width: 100%; padding: 11px; background: transparent; border: 1.5px solid #E5E7EB; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; color: #6B7280; cursor: pointer; text-decoration: none; display: block; }
    .success { display: none; }
    .accounts-box { margin: 1rem 0; text-align: left; background: #F4F6FA; border-radius: 10px; padding: 1rem; font-size: 0.78rem; max-height: 220px; overflow-y: auto; border: 1px solid #E5E7EB; }
    .account-row { padding: 6px 0; border-bottom: 1px solid #E5E7EB; line-height: 1.7; }
    .account-row:last-child { border-bottom: none; }
    code { background: #F0EAF5; color: #6B0080; padding: 1px 5px; border-radius: 4px; font-size: 0.76rem; }
  </style>
</head>
<body>
<div class="card">
  <div id="before">
    <div class="icon">🗑️</div>
    <h1>Clear All CMS Data</h1>
    <p>This will delete all registered accounts and the current session.<br><strong>This cannot be undone.</strong></p>

    <div class="accounts-box" id="accountsList"></div>

    <button class="btn" onclick="clearAll()">Yes, Delete Everything</button>
    <a href="login.html" class="btn-back">Cancel — Go Back</a>
  </div>
  <div id="after" class="success">
    <div class="icon">✅</div>
    <h1>Data Cleared</h1>
    <p>All accounts and session data have been removed.</p>
    <a href="signup.html" style="display:block;margin-bottom:0.75rem;padding:12px;background:#6B0080;color:white;border-radius:10px;font-family:Inter,sans-serif;font-size:0.88rem;font-weight:700;text-decoration:none;">Register New Account</a>
    <a href="login.html" class="btn-back">Go to Login</a>
  </div>
</div>
<script>
  (function showAccounts() {
    const users = JSON.parse(localStorage.getItem('cms_users') || '[]');
    const box   = document.getElementById('accountsList');
    if (!users.length) {
      box.innerHTML = '<em style="color:#6B7280;">No accounts stored yet.</em>';
      return;
    }
    box.innerHTML = '<strong style="display:block;margin-bottom:6px;">Stored accounts (' + users.length + '):</strong>' +
      users.map(u =>
        `<div class="account-row">
          <strong>${u.email}</strong><br>
          Role: <code>${u.role}</code>
          ${u.department ? ' &nbsp;·&nbsp; Dept: <code>' + u.department + '</code>' : ''}
          ${u.matric     ? ' &nbsp;·&nbsp; Matric: <code>' + u.matric + '</code>'     : ''}
          <br>Password: <code>${u.password}</code>
        </div>`
      ).join('');
  })();

  function clearAll() {
    localStorage.removeItem('cms_users');
    localStorage.removeItem('cms_session');
    document.getElementById('before').style.display = 'none';
    document.getElementById('after').style.display  = 'block';
  }
</script>
</body>
</html>
