<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Signing out…</title>
  <style>
    body { font-family: Inter, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #F4F6FA; margin: 0; }
    p { color: #6B7280; font-size: 0.9rem; }
  </style>
</head>
<body>
  <p>Signing out…</p>
  <script type="module">
    localStorage.removeItem('cms_session');
    const { supabase } = await import('./js/supabase.js');
    await supabase.auth.signOut();
    window.location.href = 'login.html';
  </script>
</body>
</html>
